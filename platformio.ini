[platformio]
default_envs = tab5_embedded

; ── Standalone CAN output (e.g. ESP32-DevKitC + M5Stack CAN Unit) ─────────────
[env:can_standalone]
platform    = espressif32
board       = esp32dev
framework   = arduino
build_flags =
    -DSPEEDOMETER_OUTPUT_CAN

; ── Embedded in Tab5 dashboard project (no CAN, exposes getMPH()) ─────────────
[env:tab5_embedded]
platform    = espressif32
board       = m5stack-tab5        ; adjust to your actual board target if different
framework   = arduino
build_flags =
    -DSPEEDOMETER_EMBEDDED
    ; Core pinning: VSS ISR on core 0, UI on core 1
    -DVSS_TASK_CORE=0
    -DVSS_TASK_STACK=4096
    -DVSS_TASK_PRIORITY=5
